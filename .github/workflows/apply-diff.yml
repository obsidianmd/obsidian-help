name: Apply EN diff to locales

on:
  workflow_dispatch:
    inputs:
      from_ref:
        description: 'Git ref to diff from (e.g. HEAD~1, a commit SHA)'
        required: true
  push:
    branches: [master]
    paths:
      - 'en/**'

jobs:
  apply-diff:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
    strategy:
      matrix:
        locale: [ar, da, de, es, fa, fr, id, it, ja, km, ko, pt-br, ru, vi, zh, zh-TW]
      fail-fast: false

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install script dependencies
        run: npm install
        working-directory: scripts

      - name: Apply diff to ${{ matrix.locale }}
        run: |
          FROM=${{ github.event.inputs.from_ref || github.event.before }}
          echo "Diffing from: $FROM"
          npx tsx scripts/apply-diff-locale.ts "${{ matrix.locale }}" --from "$FROM"

      - name: Upload changes as patch
        run: |
          git diff > /tmp/${{ matrix.locale }}.patch
          echo "Patch size: $(wc -c < /tmp/${{ matrix.locale }}.patch) bytes"

      - uses: actions/upload-artifact@v4
        with:
          name: patch-${{ matrix.locale }}
          path: /tmp/${{ matrix.locale }}.patch
          if-no-files-found: ignore

  commit:
    needs: apply-diff
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all patches
        uses: actions/download-artifact@v4
        with:
          pattern: patch-*
          path: /tmp/patches

      - name: Apply patches and commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          for patch in /tmp/patches/patch-*/*.patch; do
            [ -s "$patch" ] || continue  # skip empty patches
            echo "Applying $patch"
            git apply "$patch"
          done

          git diff --staged --quiet && git diff --quiet && echo "No changes to commit" && exit 0
          git add .
          git commit -m "chore: apply EN diff to locales"
          git push
