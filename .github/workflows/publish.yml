name: Publish

on:
  workflow_dispatch:
  push:
    branches: [master]
    paths-ignore:
      - 'scripts/**'
      - 'Sandbox/**'
      - 'Release notes/**'
      - '.github/**'
      - 'node_modules/**'
      - '*.md'

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      OBSIDIAN_AUTH_TOKEN: ${{ secrets.OB_AUTH_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install ob CLI
        run: npm install -g obsidian-headless

      - name: Install script dependencies
        run: npm install
        working-directory: scripts

      # Discover all help-* sites from the account and link any whose
      # locale directory exists in the repo (help → en, help-<xx> → <xx>).
      # Uses a temp file instead of a pipe so ob publish-setup runs in the
      # main shell and its config writes are visible to subsequent steps.
      - name: Link publish sites
        run: |
          ob publish-list-sites | grep -E '^\s+[0-9a-f]{32}\s+"help' > /tmp/sites.txt
          cat /tmp/sites.txt

          while read -r siteId slug; do
            slug="${slug//\"/}"
            locale=$( [ "$slug" = "help" ] && echo "en" || echo "${slug#help-}" )
            if [ -d "$GITHUB_WORKSPACE/$locale" ]; then
              echo "Linking $locale ($siteId)..."
              ob publish-setup --site "$siteId" --path "$GITHUB_WORKSPACE/$locale"
            else
              echo "Skipping $slug — no $locale/ directory"
            fi
          done < /tmp/sites.txt

      - name: Update publish.js
        run: npx tsx scripts/build-publish-js.ts

      - name: Update publish.css
        run: npx tsx scripts/build-publish-css.ts

      - name: Publish all sites and update nav
        run: npx tsx scripts/publish-all.ts
