name: Publish

on:
  workflow_dispatch:
  # When EN content changes, wait for apply-diff to commit translations first
  workflow_run:
    workflows: ["Apply EN diff to locales"]
    types: [completed]
    branches: [master]
  # Locale-only changes publish directly (no translation step needed)
  push:
    branches: [master]
    paths-ignore:
      - 'en/**'
      - 'scripts/**'
      - 'Sandbox/**'
      - 'Release notes/**'
      - '.github/**'
      - 'node_modules/**'
      - '*.md'

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      OBSIDIAN_AUTH_TOKEN: ${{ secrets.OB_AUTH_TOKEN }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install ob CLI
        run: npm install -g obsidian-headless

      - name: Set up ob auth
        run: |
          node -e "
            const os = require('os'), path = require('path'), fs = require('fs');
            const dir = os.platform() === 'linux'
              ? path.join(process.env.XDG_CONFIG_HOME || path.join(os.homedir(), '.config'), 'obsidian-headless')
              : path.join(os.homedir(), '.obsidian-headless');
            fs.mkdirSync(dir, { recursive: true });
            fs.writeFileSync(path.join(dir, 'auth_token'), process.env.OBSIDIAN_AUTH_TOKEN);
          "

      - name: Install script dependencies
        run: npm install
        working-directory: scripts

      # Discover all help-* sites from the account and link any whose
      # locale directory exists in the repo (help → en, help-<xx> → <xx>).
      # Uses a temp file instead of a pipe so ob publish-setup runs in the
      # main shell and its config writes are visible to subsequent steps.
      - name: Link publish sites
        run: |
          ob publish-list-sites | grep -E '^\s+[0-9a-f]{32}\s+"help' > /tmp/sites.txt
          cat /tmp/sites.txt

          while read -r siteId slug; do
            slug="${slug//\"/}"
            locale=$( [ "$slug" = "help" ] && echo "en" || echo "${slug#help-}" )
            dir=$(find "$GITHUB_WORKSPACE" -maxdepth 1 -type d -iname "$locale" | head -1)
            if [ -n "$dir" ]; then
              echo "Linking $locale ($siteId) → $dir"
              ob publish-setup --site "$siteId" --path "$dir"
            else
              echo "Skipping $slug — no $locale/ directory"
            fi
          done < /tmp/sites.txt

      - name: Determine changed locales
        id: changed
        run: |
          # Manual trigger or first-ever push → publish all
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] ||
             [ "${{ github.event.before }}" = "0000000000000000000000000000000000000000" ]; then
            echo "locales=" >> $GITHUB_OUTPUT
            echo "Publishing all locales"
            exit 0
          fi

          # If en/publish.js or en/publish.css changed, all locales are affected
          if git diff --name-only "${{ github.event.before }}" "${{ github.sha }}" \
              | grep -qE '^en/publish\.(js|css)$'; then
            echo "locales=" >> $GITHUB_OUTPUT
            echo "EN publish assets changed — publishing all locales"
            exit 0
          fi

          # Otherwise publish only the locale dirs that have changed files
          LOCALES=$(git diff --name-only "${{ github.event.before }}" "${{ github.sha }}" \
            | cut -d/ -f1 | sort -u \
            | node -e "
                const fs = require('fs');
                const defs = JSON.parse(fs.readFileSync('scripts/locales.json', 'utf8'));
                const valid = new Set(defs.map(l => l.dir ?? l.code));
                const lines = fs.readFileSync('/dev/stdin', 'utf8').trim().split('\n');
                process.stdout.write(lines.filter(l => valid.has(l)).join(' '));
              ")
          echo "locales=$LOCALES" >> $GITHUB_OUTPUT
          echo "Publishing locales: $LOCALES"

      - name: Update publish.js
        run: npx tsx scripts/build-publish-js.ts ${{ steps.changed.outputs.locales }}

      - name: Update publish.css
        run: npx tsx scripts/build-publish-css.ts ${{ steps.changed.outputs.locales }}

      - name: Publish and update nav
        run: npx tsx scripts/publish-all.ts ${{ steps.changed.outputs.locales }}
